<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="an interactive pricing table">
        <link rel="stylesheet" href="style.css">
        <title>Interactive Pricing Table</title>
    </head>
    <body>
        <header>
            <h1>CHOOSE YOUR PLAN</h1>
            <p>Simple, transparent pricing</p>
        </header>
        <main>
            <div class="pricing">
                <div class="pricing-models">
                    <h2>FREE</h2>
                    <h4>$0/Month</h4>
                    <div class="features">
                        <p class="available">Feature</p>
                        <p class="unavailable">Feature</p>
                        <p class="unavailable">Feature</p>
                    </div>
                    <button>Get Started</button>

                </div>
                <div class="pricing-models">
                    <h2>PRO</h2>
                    <h3>🌟 POPULAR</h3>
                    <h4>$29/Month</h4>
                    <div class="features">
                        <p class="available">Features</p>
                        <p class="available">Features</p>
                        <p class="unavailable">Features</p>
                    </div>
                    <button>Get Started</button>
                </div>
                <div class="pricing-models">
                    <h2>ENTERPRISE</h2>
                    <h4>$99/Month</h4>
                    <div class="features">
                        <p class="available">Features</p>
                        <p class="available">Features</p>
                        <p class="available">Features</p>
                    </div>
                    <button>Get Started</button>
                </div>
            </div>
        </main>
        <footer>

        </footer>
    </body>
</html>
